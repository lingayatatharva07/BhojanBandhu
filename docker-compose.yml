services:
  mysql:
    image: mysql:8.4
    container_name: bhojanbandhu-mysql
    environment:
      MYSQL_DATABASE: bhojanbandhu
      MYSQL_USER: bhojan_user
      MYSQL_PASSWORD: bhojan_pass
      MYSQL_ROOT_PASSWORD: root_pass
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-proot_pass"]
      interval: 10s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7.4
    container_name: bhojanbandhu-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

volumes:
  mysql_data:
  redis_data:

